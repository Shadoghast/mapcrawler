name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build zip
        run: |
          zip -r mapcrawler.zip \
            module.json \
            mapcrawler.mjs \
            module/ \
            lang/ \
            styles/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            module.json
            mapcrawler.zip
          generate_release_notes: true
